<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evolution">
<title>Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --g:#2d6a4f;--gl:#d8f3dc;--gm:#52b788;
  --r:#9b2226;--rl:#fde8e8;--rm:#e05555;
  --bg:#f8f5f0;--card:#fff;--text:#1c1c1e;--muted:#888;--border:#e5dfd6;
  --gold:#b5832a;--gold-l:#fdf3e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body{padding-bottom:80px}

/* HEADER */
.hdr{background:var(--text);color:#fff;padding:48px 20px 18px;display:flex;justify-content:space-between;align-items:flex-end}
.hdr-left h1{font-family:'DM Serif Display',serif;font-size:30px;font-weight:400;letter-spacing:-.5px}
.hdr-left p{font-size:13px;opacity:.5;margin-top:3px;text-transform:capitalize}
.pts-badge{background:var(--gold);color:#fff;font-size:13px;font-weight:600;padding:7px 16px;border-radius:30px}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;padding:11px 0 9px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted);transition:color .15s}
.nb.on{color:var(--g)}
.nb span:first-child{font-size:21px;line-height:1}

/* SCREENS */
.scr{display:none;padding:14px 16px}
.scr.on{display:block}

/* CARDS */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}

/* ROWS */
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none;padding-bottom:0}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--gm)}.dot.r{background:var(--rm)}
.ri{flex:1;min-width:0}
.rn{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rm2{font-size:12px;color:var(--muted);margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
.bg{background:var(--gl);color:var(--g)}.br{background:var(--rl);color:var(--r)}
.bgray{background:#f0ece6;color:var(--muted)}
.xbtn{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0 3px;flex-shrink:0;line-height:1}

/* CHECK */
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .15s}
.chk.on{background:var(--gm);border-color:var(--gm);color:#fff}

/* LOCK */
.locked{opacity:.4}
.prog-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:5px}
.prog-fill{height:100%;background:var(--rm);border-radius:2px;transition:width .3s}

/* FORM */
.frow{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.finput{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none}
.finput:focus{border-color:var(--gold)}

/* BUTTONS */
.btn{width:100%;padding:14px;border:none;border-radius:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-gold{background:var(--gold);color:#fff}
.btn-sm{width:auto;padding:6px 13px;font-size:12px}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:9px 6px;background:var(--card);border:1px solid var(--border);border-radius:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);text-align:center;transition:all .15s}
.tab.on-g{background:var(--g);border-color:var(--g);color:#fff}
.tab.on-r{background:var(--r);border-color:var(--r);color:#fff}

/* DAY SELECTOR */
.dsel{background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.dsel-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.dsel-lbl{font-size:15px;font-weight:500;text-transform:capitalize}
.dsel-sub{font-size:12px;color:var(--muted);margin-top:2px}
.dsel-arr{color:var(--muted);font-size:12px;transition:transform .2s}
.dsel-arr.open{transform:rotate(180deg)}
.dlist{border-top:1px solid var(--border);max-height:300px;overflow-y:auto}
.dlist.hide{display:none}
.dopt{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);transition:background .1s}
.dopt:last-child{border-bottom:none}
.dopt:active{background:var(--bg)}
.dopt.sel{color:var(--g);font-weight:600}
.dopt-meta{font-size:12px;color:var(--muted)}
.cat-note{font-size:12px;color:var(--muted);margin-top:2px}
.hide{display:none!important}

/* STATS */
.stats{display:flex;gap:10px;margin-bottom:14px}
.sbox{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.sbox.saldo{padding:16px 14px}
.snum{font-size:26px;font-weight:600}
.snum.saldo{font-size:34px;line-height:1}
.slbl{font-size:11px;color:var(--muted);margin-top:1px}
.slbl.saldo{font-size:12px;letter-spacing:.02em;margin-bottom:4px}
.snum.g{color:var(--g)}.snum.r{color:var(--r)}

/* TIMELINE */
.tl-row{display:flex;gap:10px;padding:8px 0}
.tl-time{font-size:12px;font-weight:600;color:var(--muted);min-width:44px;text-align:right;padding-top:3px}
.tl-col{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.tl-dot.g{background:var(--gm)}.tl-dot.r{background:var(--rm)}
.tl-line{width:2px;flex:1;min-height:14px;background:var(--border);margin-top:3px}
.tl-body{flex:1;padding-bottom:4px}
.tl-name{font-size:14px;font-weight:500}
.tl-tag{display:inline-block;margin-top:3px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}

/* DIVIDER */
.div{display:flex;align-items:center;gap:8px;margin:4px 0 12px}
.div span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--border)}

/* EMPTY */
.empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:14px}
.empty-ic{font-size:38px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>Evolution</h1>
    <p id="hdrDate"></p>
  </div>
  <div class="pts-badge" id="ptsBadge">0 pts</div>
</div>

<!-- HOY -->
<div class="scr on" id="s-hoy">
  <div class="card" style="margin-top:4px">
    <div class="card-ttl">Filtro</div>
    <div class="frow" style="margin-bottom:0">
      <label class="flabel">Categoría</label>
      <select class="finput" id="todayCategory" onchange="setTodayCategory(this.value)"></select>
    </div>
  </div>
  <div id="actList"></div>
  <div id="prizList"></div>
</div>

<!-- ACTIVIDADES Y PREMIOS -->
<div class="scr" id="s-vars">
  <div class="card" style="margin-top:4px">
    <div class="card-ttl" id="addTitle">Agregar nueva actividad</div>
    <div class="tabs" style="margin-bottom:14px">
      <div class="tab on-g" id="tv-g" onclick="setVarTab('g')">🟢 Actividades</div>
      <div class="tab" id="tv-r" onclick="setVarTab('r')">🔴 Premios</div>
    </div>

    <div id="fa-g">
      <div class="frow">
        <label class="flabel">Nombre</label>
        <input class="finput" id="gName" placeholder="ej. Ejercicio, Meditación...">
      </div>
      <div class="frow">
        <label class="flabel">Puntos que otorga</label>
        <input type="number" class="finput" id="gPts" placeholder="ej. 20" min="1" inputmode="numeric">
      </div>
      <div class="frow">
        <label class="flabel">Categoría</label>
        <select class="finput" id="gCat" onchange="toggleNewCat('g')"></select>
      </div>
      <div class="frow hide" id="gNewCatWrap">
        <label class="flabel">Nombre de la nueva categoría</label>
        <input class="finput" id="gNewCat" placeholder="ej. Salud, Trabajo, Ocio...">
      </div>
      <button class="btn btn-g" onclick="addAct()">Agregar actividad</button>
    </div>

    <div id="fa-r" style="display:none">
      <div class="frow">
        <label class="flabel">Nombre del premio</label>
        <input class="finput" id="rName" placeholder="ej. Netflix, Redes sociales...">
      </div>
      <div class="frow">
        <label class="flabel">Puntos necesarios para desbloquearlo</label>
        <input type="number" class="finput" id="rCost" placeholder="ej. 30" min="1" inputmode="numeric">
      </div>
      <div class="frow">
        <label class="flabel">Categoría</label>
        <select class="finput" id="rCat" onchange="toggleNewCat('r')"></select>
      </div>
      <div class="frow hide" id="rNewCatWrap">
        <label class="flabel">Nombre de la nueva categoría</label>
        <input class="finput" id="rNewCat" placeholder="ej. Salud, Trabajo, Ocio...">
      </div>
      <button class="btn btn-r" onclick="addPriz()">Agregar premio</button>
    </div>
  </div>

  <div class="card">
    <div class="card-ttl">Variables creadas</div>
    <div id="varList"></div>
  </div>
</div>

<!-- RESUMEN -->
<div class="scr" id="s-res">
  <div id="dselWrap"></div>
  <div id="resDetail"></div>
  <button class="btn btn-gold" style="margin-top:4px" onclick="exportXL()">📊 Descargar Excel (30 días)</button>
</div>

<nav class="nav">
  <button class="nb on" onclick="go('hoy',this)"><span>☀️</span>Hoy</button>
  <button class="nb" onclick="go('vars',this)"><span>📋</span>Actividades y premios</button>
  <button class="nb" onclick="go('res',this)"><span>📊</span>Resumen</button>
</nav>

<div class="toast" id="toast"></div>


<script>
// ── STATE ──────────────────────────────────────────────────
var S = {acts:[], prizs:[], log:{}, categories:[]};
var DAYFULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
var selDay, dropOpen = false, todayCat='all';

function load(){
  var s=localStorage.getItem('evo1');
  if(s)S=JSON.parse(s);
  if(!S.categories) S.categories=[];
  if(S.acts){S.acts.forEach(function(a){
    a.days=[0,1,2,3,4,5,6];
    if(!a.category) a.category='Sin categoría';
    if(S.categories.indexOf(a.category)<0) S.categories.push(a.category);
  });}
  if(S.prizs){S.prizs.forEach(function(r){
    if(!r.category) r.category='Sin categoría';
    if(S.categories.indexOf(r.category)<0) S.categories.push(r.category);
  });}
  S.categories = S.categories.filter(function(c,i,arr){ return c && arr.indexOf(c)===i; });
}
function save(){localStorage.setItem('evo1',JSON.stringify(S));}
function today(){return new Date().toISOString().split('T')[0];}
function nowT(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function pad(n){return n.toString().padStart(2,'0');}
function di(ds){return(new Date(ds+'T12:00:00').getDay()+6)%7;}
function dlabel(ds){return new Date(ds+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});}
function dshort(ds){return new Date(ds+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});}
function uid(){return Math.random().toString(36).slice(2,8);}
function sortCats(arr){ return arr.slice().sort(function(a,b){ return a.localeCompare(b,'es'); }); }
function ensureCategory(name){
  name=(name||'').trim();
  if(!name) return '';
  if(S.categories.indexOf(name)<0) S.categories.push(name);
  S.categories = sortCats(S.categories);
  return name;
}
function resolveCategory(type){
  var sel=document.getElementById(type==='g'?'gCat':'rCat');
  var newInput=document.getElementById(type==='g'?'gNewCat':'rNewCat');
  var val=sel ? sel.value : '';
  if(val==='__new__') val = ensureCategory(newInput.value);
  else val = ensureCategory(val||'Sin categoría');
  return val || '';
}
function renderCategorySelects(){
  var cats = sortCats(S.categories);
  var opts = '<option value="Sin categoría">Sin categoría</option>'
    + cats.filter(function(c){return c!=='Sin categoría';}).map(function(c){return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>';}).join('')
    + '<option value="__new__">+ Nueva categoría</option>';
  var g=document.getElementById('gCat'), r=document.getElementById('rCat');
  if(g){
    var gv=g.value||'Sin categoría';
    g.innerHTML=opts;
    g.value = (cats.indexOf(gv)>=0 || gv==='Sin categoría' || gv==='__new__') ? gv : 'Sin categoría';
  }
  if(r){
    var rv=r.value||'Sin categoría';
    r.innerHTML=opts;
    r.value = (cats.indexOf(rv)>=0 || rv==='Sin categoría' || rv==='__new__') ? rv : 'Sin categoría';
  }
  toggleNewCat('g'); toggleNewCat('r');
}
function renderTodayCategoryFilter(){
  var sel=document.getElementById('todayCategory');
  if(!sel) return;
  var cats = sortCats(S.categories);
  sel.innerHTML = '<option value="all">Todas las categorías</option>' + cats.map(function(c){ return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>';}).join('');
  if(todayCat!=='all' && cats.indexOf(todayCat)<0) todayCat='all';
  sel.value=todayCat;
}
function toggleNewCat(type){
  var sel=document.getElementById(type==='g'?'gCat':'rCat');
  var wrap=document.getElementById(type==='g'?'gNewCatWrap':'rNewCatWrap');
  if(!sel || !wrap) return;
  wrap.classList.toggle('hide', sel.value!=='__new__');
}
function setTodayCategory(val){
  todayCat=val||'all';
  renderHoy();
}

function getLog(ds){
  if(!S.log[ds])S.log[ds]={acts:{},prizes:{}};
  var l=S.log[ds];

  // Migración desde versiones anteriores
  if(!l.acts) l.acts={};
  if(!l.prizes) l.prizes={};

  if(l.checked){
    if(Array.isArray(l.checked)){
      l.checked.forEach(function(id){ if(!l.acts[id]) l.acts[id]=['--:--']; });
    } else {
      Object.keys(l.checked).forEach(function(id){
        var v=l.checked[id];
        if(!l.acts[id]) l.acts[id]=[v||'--:--'];
      });
    }
    delete l.checked;
  }

  if(Array.isArray(l.spent)){
    l.spent.forEach(function(id){
      if(!l.prizes[id]) l.prizes[id]=['--:--'];
    });
    delete l.spent;
  }

  Object.keys(l.acts).forEach(function(id){
    if(!Array.isArray(l.acts[id])) l.acts[id]=l.acts[id] ? [l.acts[id]] : [];
  });
  Object.keys(l.prizes).forEach(function(id){
    if(!Array.isArray(l.prizes[id])) l.prizes[id]=l.prizes[id] ? [l.prizes[id]] : [];
  });

  return l;
}

function counts(ds){
  var l=getLog(ds);
  var earned=0, spent=0, actCount=0, prizeCount=0;

  S.acts.forEach(function(a){
    var c=(l.acts[a.id]||[]).length;
    actCount += c;
    earned += c * Number(a.pts);
  });
  S.prizs.forEach(function(r){
    var c=(l.prizes[r.id]||[]).length;
    prizeCount += c;
    spent += c * Number(r.cost);
  });

  return {earned:earned, spent:spent, net:earned-spent, actCount:actCount, prizeCount:prizeCount};
}

function updPts(){
  var c=counts(today());
  document.getElementById('ptsBadge').textContent=c.net+' pts';
}

// ── BOOT ──────────────────────────────────────────────────
window.onload=function(){
  load(); selDay=today();
  document.getElementById('hdrDate').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  renderCategorySelects(); renderTodayCategoryFilter();
  renderHoy(); setVarTab('g'); updPts();
};

// ── HELPERS DE USOS ───────────────────────────────────────
function actUses(ds,id){ return (getLog(ds).acts[id]||[]).length; }
function prizeUses(ds,id){ return (getLog(ds).prizes[id]||[]).length; }

function addActUse(id){
  var l=getLog(today());
  if(!l.acts[id]) l.acts[id]=[];
  l.acts[id].push(nowT());
  save(); renderHoy(); updPts();
}
function removeActUse(id){
  var l=getLog(today());
  if(!l.acts[id] || !l.acts[id].length) return;
  l.acts[id].pop();
  if(!l.acts[id].length) delete l.acts[id];
  save(); renderHoy(); updPts();
}
function addPrizeUse(id){
  var l=getLog(today()), c=counts(today());
  var r=S.prizs.find(function(x){ return x.id===id; });
  if(!r) return;
  if(c.net < Number(r.cost)) return showToast('No te alcanzan los puntos');
  if(!l.prizes[id]) l.prizes[id]=[];
  l.prizes[id].push(nowT());
  save(); renderHoy(); updPts(); showToast('¡Premio canjeado! 🎉');
}
function removePrizeUse(id){
  var l=getLog(today());
  if(!l.prizes[id] || !l.prizes[id].length) return;
  l.prizes[id].pop();
  if(!l.prizes[id].length) delete l.prizes[id];
  save(); renderHoy(); updPts();
}

// ── HOY ───────────────────────────────────────────────────
function renderHoy(){
  var t=today(), c=counts(t);
  renderTodayCategoryFilter();
  var acts=S.acts.filter(function(a){ return todayCat==='all' || (a.category||'Sin categoría')===todayCat; });

  var gh='<div class="card"><div class="card-ttl">Actividades de hoy</div>';
  if(!acts.length) gh+='<div class="empty"><div class="empty-ic">🌱</div>Agregá actividades desde ➕</div>';
  else acts.forEach(function(a){
    var uses=actUses(t,a.id);
    gh+='<div class="row">'
      +'<div class="dot g"></div>'
      +'<div class="ri"><div class="rn">'+a.name+'</div><div class="rm2">'
      +(uses? (uses+' vez/veces hoy · última: '+getLog(t).acts[a.id][uses-1]) : 'Todavía no la registraste hoy')
      +' · '+(a.category||'Sin categoría')
      +'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
      +'<button class="btn btn-g btn-sm" style="padding:5px 10px" onclick="removeActUse(\''+a.id+'\')">−</button>'
      +'<span class="badge bgray" style="min-width:32px;text-align:center">'+uses+'</span>'
      +'<button class="btn btn-g btn-sm" style="padding:5px 10px" onclick="addActUse(\''+a.id+'\')">+</button>'
      +'<span class="badge bg">+'+a.pts+'</span>'
      +'</div>'
      +'</div>';
  });
  gh+='</div>';

  var rh='<div class="card"><div class="card-ttl">Premios</div>'
    +'<div class="rm2" style="margin:-6px 0 12px">Disponibles: <strong>'+c.net+' pts</strong> · Ganados: '+c.earned+' · Canjeados: '+c.spent+'</div>';
  if(!S.prizs.length) rh+='<div class="empty"><div class="empty-ic">🎁</div>Agregá premios desde ➕</div>';
  else S.prizs.filter(function(r){ return todayCat==='all' || (r.category||'Sin categoría')===todayCat; }).forEach(function(r){
    var cost=Number(r.cost), uses=prizeUses(t,r.id), unlocked=c.net>=cost;
    var pct=Math.min(100, cost ? Math.round(c.net/cost*100) : 100);
    rh+='<div class="row'+((!unlocked && !uses)?' locked':'')+'"><div class="dot r"></div>'
      +'<div class="ri"><div class="rn">'+r.name+'</div><div class="rm2">'
      +(r.category||'Sin categoría')+(uses?(' · canjeado '+uses+' vez/veces hoy'):'')
      +'</div>'
      +(!unlocked?'<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%"></div></div>':'')
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
      +'<button class="btn btn-r btn-sm" style="padding:5px 10px" onclick="removePrizeUse(\''+r.id+'\')">−</button>'
      +'<span class="badge bgray" style="min-width:32px;text-align:center">'+uses+'</span>'
      +'<button class="btn btn-r btn-sm" '+(unlocked?'':'disabled style="opacity:.45;cursor:not-allowed;padding:5px 10px"')+' onclick="addPrizeUse(\''+r.id+'\')">+</button>'
      +'<span class="badge br">'+cost+' pts</span>'
      +'</div>'
      +'</div>';
  });
  rh+='</div>';

  document.getElementById('actList').innerHTML=gh;
  document.getElementById('prizList').innerHTML=rh;
}

// ── VARS ──────────────────────────────────────────────────
var vTab='g';
function setVarTab(t){
  vTab=t;
  document.getElementById('tv-g').className='tab'+(t==='g'?' on-g':'');
  document.getElementById('tv-r').className='tab'+(t==='r'?' on-r':'');
  document.getElementById('fa-g').style.display=t==='g'?'block':'none';
  document.getElementById('fa-r').style.display=t==='r'?'block':'none';
  document.getElementById('addTitle').textContent=t==='g'?'Agregar nueva actividad':'Agregar nuevo premio';
  renderVars();
}
function renderVars(){
  var h='';
  if(vTab==='g'){
    if(!S.acts.length) h='<div class="empty"><div class="empty-ic">🌿</div>Sin actividades aún</div>';
    else{
      h='<div class="card">';
      S.acts.forEach(function(a){
        h+='<div class="row"><div class="dot g"></div><div class="ri"><div class="rn">'+a.name+'</div><div class="rm2">'+(a.category||'Sin categoría')+' · activa todos los días · reutilizable</div></div><span class="badge bg">+'+a.pts+'</span><button class="xbtn" onclick="delAct(\''+a.id+'\')">×</button></div>';
      });
      h+='</div>';
    }
  } else {
    if(!S.prizs.length) h='<div class="empty"><div class="empty-ic">🎁</div>Sin premios aún</div>';
    else{
      h='<div class="card">';
      S.prizs.forEach(function(r){
        h+='<div class="row"><div class="dot r"></div><div class="ri"><div class="rn">'+r.name+'</div><div class="rm2">'+(r.category||'Sin categoría')+' · reutilizable</div></div><span class="badge br">'+r.cost+' pts</span><button class="xbtn" onclick="delPriz(\''+r.id+'\')">×</button></div>';
      });
      h+='</div>';
    }
  }
  document.getElementById('varList').innerHTML=h;
}
function delAct(id){S.acts=S.acts.filter(function(a){return a.id!==id;});save();renderCategorySelects();renderTodayCategoryFilter();renderHoy();renderVars();updPts();showToast('Eliminado');}
function delPriz(id){S.prizs=S.prizs.filter(function(r){return r.id!==id;});save();renderCategorySelects();renderTodayCategoryFilter();renderHoy();renderVars();updPts();showToast('Eliminado');}

// ── ADD ───────────────────────────────────────────────────
function addAct(){
  var name=document.getElementById('gName').value.trim();
  var p=document.getElementById('gPts').value;
  var category=resolveCategory('g');
  if(!name)return showToast('Ingresá un nombre');
  if(!p||p<1)return showToast('Ingresá los puntos');
  if(!category)return showToast('Ingresá la categoría');
  S.acts.push({id:uid(),name:name,pts:Number(p),days:[0,1,2,3,4,5,6],category:category});
  save(); renderCategorySelects(); renderTodayCategoryFilter(); renderHoy(); renderVars(); updPts();
  document.getElementById('gName').value=''; document.getElementById('gPts').value=''; document.getElementById('gNewCat').value=''; document.getElementById('gCat').value=category; toggleNewCat('g');
  showToast('Actividad agregada ✓');
  go('vars',document.querySelectorAll('.nb')[1]);
}
function addPriz(){
  var name=document.getElementById('rName').value.trim();
  var cost=document.getElementById('rCost').value;
  var category=resolveCategory('r');
  if(!name)return showToast('Ingresá un nombre');
  if(!cost||cost<1)return showToast('Ingresá el costo en puntos');
  if(!category)return showToast('Ingresá la categoría');
  S.prizs.push({id:uid(),name:name,cost:Number(cost),desc:'',category:category});
  save(); renderCategorySelects(); renderTodayCategoryFilter(); renderHoy(); renderVars(); updPts();
  document.getElementById('rName').value=''; document.getElementById('rCost').value=''; document.getElementById('rNewCat').value=''; document.getElementById('rCat').value=category; toggleNewCat('r');
  showToast('Premio agregado ✓');
  go('vars',document.querySelectorAll('.nb')[1]);
}

// ── RESUMEN ───────────────────────────────────────────────
function last30(){
  var t=today(),d=new Date(t+'T12:00:00'),arr=[];
  for(var i=0;i<30;i++){var dt=new Date(d);dt.setDate(d.getDate()-i);arr.push(dt.toISOString().split('T')[0]);}
  return arr;
}
function renderRes(){
  var days=last30(),t=today();
  var sh='<div class="dsel"><div class="dsel-hdr" onclick="togDrop()">'
    +'<div><div class="dsel-lbl">'+(selDay===t?'Hoy · ':'')+dlabel(selDay)+'</div>'
    +'<div class="dsel-sub">Tocá para ver otro día</div></div>'
    +'<span class="dsel-arr'+(dropOpen?' open':'')+'">▼</span>'
    +'</div><div class="dlist'+(dropOpen?'':' hide')+'">';
  days.forEach(function(ds){
    var c=counts(ds);
    sh+='<div class="dopt'+(selDay===ds?' sel':'')+'" onclick="pickDay(\''+ds+'\')">'
      +'<span style="text-transform:capitalize">'+(ds===t?'Hoy · ':'')+dshort(ds)+'</span>'
      +'<span class="dopt-meta">'+c.net+' pts · '+c.actCount+' act.</span></div>';
  });
  sh+='</div></div>';
  document.getElementById('dselWrap').innerHTML=sh;

  var l=getLog(selDay), c=counts(selDay);
  var events=[], seq=0;

  function timeToMinutes(tm){
    if(!tm || tm==='--:--') return 9999;
    var parts=tm.split(':');
    return Number(parts[0])*60 + Number(parts[1]);
  }

  S.acts.forEach(function(a){
    (l.acts[a.id]||[]).forEach(function(tm){
      events.push({type:'g',name:a.name,pts:a.pts,time:tm||'--:--', timeMinutes:timeToMinutes(tm), seq:seq++});
    });
  });
  S.prizs.forEach(function(r){
    (l.prizes[r.id]||[]).forEach(function(tm){
      events.push({type:'r',name:r.name,cost:r.cost,time:tm||'--:--', timeMinutes:timeToMinutes(tm), seq:seq++});
    });
  });

  events.sort(function(a,b){
    if(a.timeMinutes!==b.timeMinutes) return a.timeMinutes-b.timeMinutes;
    return a.seq-b.seq;
  });

  var dh='<div class="card"><div class="stats">'
    +'<div class="sbox saldo"><div class="slbl saldo">Saldo total:</div><div class="snum saldo g">'+c.net+'</div></div>'
    +'<div class="sbox"><div class="snum g">'+c.earned+'</div><div class="slbl">ganados</div></div>'
    +'<div class="sbox"><div class="snum r">'+c.spent+'</div><div class="slbl">canjeados</div></div>'
    +'</div>';

  if(!events.length){
    dh+='<div class="empty" style="padding:16px 0"><div class="empty-ic">📭</div>Sin actividad este día</div>';
  } else {
    dh+='<div class="div"><span>📈 Línea de tiempo</span></div>';
    events.forEach(function(ev,i){
      var last=i===events.length-1;
      dh+='<div class="tl-row"><div class="tl-time">'+ev.time+'</div>'
        +'<div class="tl-col"><div class="tl-dot '+ev.type+'"></div>'+(last?'':'<div class="tl-line"></div>')+'</div>'
        +'<div class="tl-body"><div class="tl-name">'+ev.name+'</div>'
        +(ev.type==='g'
          ? '<span class="tl-tag bg">+'+ev.pts+' pts</span>'
          : '<span class="tl-tag br">−'+ev.cost+' pts</span>')
        +'</div></div>';
    });
  }
  dh+='</div>';
  document.getElementById('resDetail').innerHTML=dh;
}
function togDrop(){dropOpen=!dropOpen;renderRes();}
function pickDay(ds){selDay=ds;dropOpen=false;renderRes();}

// ── EXCEL ─────────────────────────────────────────────────
function exportXL(){
  var days=last30().reverse(),wb=XLSX.utils.book_new();
  var w1=[['Fecha','Día','Puntos netos','Puntos ganados','Puntos canjeados','Actividades completadas','Premios usados']];
  days.forEach(function(d){
    var c=counts(d), l=getLog(d);
    var actNames=[], prizeNames=[];
    S.acts.forEach(function(a){
      var n=(l.acts[a.id]||[]).length;
      if(n) actNames.push(a.name+' x'+n);
    });
    S.prizs.forEach(function(r){
      var n=(l.prizes[r.id]||[]).length;
      if(n) prizeNames.push(r.name+' x'+n);
    });
    w1.push([d,DAYFULL[di(d)],c.net,c.earned,c.spent,actNames.join(', ')||'-',prizeNames.join(', ')||'-']);
  });
  var s1=XLSX.utils.aoa_to_sheet(w1);s1['!cols']=[{wch:12},{wch:12},{wch:12},{wch:14},{wch:16},{wch:40},{wch:30}];
  XLSX.utils.book_append_sheet(wb,s1,'Resumen');

  var w2=[['Fecha','Actividad','Hora','Puntos']];
  days.forEach(function(d){
    var l=getLog(d);
    S.acts.forEach(function(a){
      (l.acts[a.id]||[]).forEach(function(tm){ w2.push([d,a.name,tm||'-',a.pts]); });
    });
  });
  var s2=XLSX.utils.aoa_to_sheet(w2);s2['!cols']=[{wch:12},{wch:22},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb,s2,'Actividades');

  var w3=[['Fecha','Premio','Hora','Puntos restados']];
  days.forEach(function(d){
    var l=getLog(d);
    S.prizs.forEach(function(r){
      (l.prizes[r.id]||[]).forEach(function(tm){ w3.push([d,r.name,tm||'-',r.cost]); });
    });
  });
  var s3=XLSX.utils.aoa_to_sheet(w3);s3['!cols']=[{wch:12},{wch:22},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb,s3,'Premios');

  XLSX.writeFile(wb,'evolution_reutilizable_'+days[0].replace(/-/g,'')+'_'+days[days.length-1].replace(/-/g,'')+'.xlsx');
  showToast('Excel descargado ✓');
}

// ── NAV ───────────────────────────────────────────────────
function go(scr,btn){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('s-'+scr).classList.add('on');
  if(btn) btn.classList.add('on');
  if(scr==='res'){selDay=today();dropOpen=false;renderRes();}
  if(scr==='vars') renderVars();
  if(scr==='hoy') renderHoy();
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2200);
}
</script>
